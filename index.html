<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon-512.png" />
    <link rel="apple-touch-icon" href="/favicon-512.png" />
    <title>榴莲人格导购官</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.__appBootOk = false;
      window.__appBootError = "";

      window.addEventListener("error", function (event) {
        window.__appBootError = event && event.message ? event.message : "Unknown script error";
      });

      setTimeout(function () {
        var root = document.getElementById("root");
        if (!window.__appBootOk && root && root.childElementCount === 0) {
          root.innerHTML =
            '<main style="margin:24px auto;width:min(760px,calc(100% - 32px));padding:20px;border-radius:16px;background:#fffef7;border:1px solid rgba(24,34,26,.15);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,Microsoft YaHei,sans-serif;">' +
            '<h1 style="margin:0 0 10px;font-size:24px;color:#18221a;">页面没有正常启动</h1>' +
            '<p style="margin:0 0 12px;color:#5c665b;line-height:1.7;">已触发兜底提示。通常是浏览器不兼容或脚本执行失败导致。请刷新一次；若仍失败，请把这段错误发给我。</p>' +
            '<pre style="margin:0;white-space:pre-wrap;word-break:break-word;background:#f3f4f6;border:1px solid rgba(24,34,26,.12);border-radius:10px;padding:12px;font-size:12px;color:#1f2937;">' +
            (window.__appBootError || "No runtime error captured") +
            "</pre>" +
            "</main>";
        }
      }, 2200);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
